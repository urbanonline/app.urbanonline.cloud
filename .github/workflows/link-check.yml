name: Check website for broken links

on:
  # Trigger the workflow every time you push to the `main` branch
  push:
    branches: [ main ]
  # Run link check on any pull request.
  pull_request:
  # Allows you to run this workflow manually from the Actions tab on GitHub.
  workflow_dispatch:

# Allow this job to clone the repo and perform a link check
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./website
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install pnpm as package manager
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11
          # cache: true
          run_install: true
            #- cwd: website

      - name: Build website
        run: pnpm build

      - name: Check links using hyperlink
        uses: untitaker/hyperlink@9375bc4063712ad490d5eb3d54df0b6aade15e54 # 0.3.2
        with:
          args: --check-anchors website/dist
